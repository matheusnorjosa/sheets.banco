version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    ignore:
      # Prisma 7 is a breaking change: `url` moves out of `schema.prisma` into
      # `prisma.config.ts`, and `PrismaClient` requires a driver adapter
      # (e.g. `@prisma/adapter-pg`) at runtime. Closed PR #46 hit P1012 on
      # `prisma generate` for this reason. Pin majors until the migration is
      # done as a dedicated task; minor/patch within 6.x still flow through.
      - dependency-name: "@prisma/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
    groups:
      # Coordinate Prisma updates — `@prisma/client` and `prisma` (CLI) must
      # be on the same major or `prisma generate` fails. Catches all bump
      # types (major included) so the two packages always ship together.
      # Closed PR #36 (only bumped client to 7.x without CLI) is the case
      # this group prevents.
      prisma:
        patterns:
          - "@prisma/*"
          - "prisma"
      # Group minor + patch bumps to avoid PR noise
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore(actions)
