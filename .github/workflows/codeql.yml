name: CodeQL

# Static analysis for JavaScript/TypeScript. Runs on push/PR and weekly so
# newly published CodeQL queries can catch issues in old code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 9 * * 1'  # Mondays 09:17 UTC — off the busy crontab minute.

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
