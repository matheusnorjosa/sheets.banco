name: Dependabot auto-merge

# Triggered for every Dependabot PR. Patch and minor bumps are auto-merged
# once branch protection checks go green; majors stay in queue for review.
#
# Uses pull_request_target so the workflow has access to the standard
# GITHUB_TOKEN scopes — Dependabot PRs run with reduced permissions otherwise.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch/minor bumps
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on majors (kept open for human review)
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: |
          gh pr comment "$PR_URL" --body \
            "Major bump (${{ steps.meta.outputs.dependency-names }}: ${{ steps.meta.outputs.previous-version }} → ${{ steps.meta.outputs.new-version }}). Auto-merge skipped — review the changelog before approving."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
